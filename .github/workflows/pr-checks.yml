name: Merge Gate - PR Checks

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-gates:
    name: Merge Gates (Lint, Type, Test, Build)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type Check
        run: npm run typecheck
        continue-on-error: false
        timeout-minutes: 10
      
      - name: Lint (ESLint)
        run: npm run lint
        continue-on-error: false
        timeout-minutes: 5
      
      - name: Unit & Integration Tests
        run: npm run test:coverage
        continue-on-error: false
        timeout-minutes: 20
      
      - name: Build Check
        run: npm run build
        continue-on-error: false
        timeout-minutes: 10
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  security-audit:
    name: Security Audit & Hardcoded Secrets Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: NPM Audit (Production)
        run: npm audit --production --audit-level=moderate
        continue-on-error: true
        timeout-minutes: 5
      
      - name: Check for Hardcoded Secrets (Stripe)
        run: |
          if grep -r "sk_live_" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
            echo "❌ Found potential hardcoded Stripe keys"
            exit 1
          fi
          if grep -r "pk_live_" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
            echo "❌ Found potential hardcoded Stripe keys"
            exit 1
          fi
          echo "✓ No obvious hardcoded Stripe secrets detected"
        continue-on-error: false
        timeout-minutes: 5
      
      - name: Check for Hardcoded Secrets (API Keys)
        run: |
          if grep -r "AIza" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
            echo "❌ Found potential hardcoded Google API keys"
            exit 1
          fi
          if grep -r "SUPABASE_KEY" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null | grep -v "process.env\|NEXT_PUBLIC"; then
            echo "⚠️  Check for hardcoded Supabase keys"
          fi
          echo "✓ No obvious hardcoded API keys detected"
        continue-on-error: false
        timeout-minutes: 5

  status-check:
    name: Merge Gate Status
    runs-on: ubuntu-latest
    needs: [merge-gates, security-audit]
    if: always()
    
    steps:
      - name: Check merge gate results
        run: |
          if [ "${{ needs.merge-gates.result }}" != "success" ] || [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "❌ Merge gates failed. Fix errors above before merging."
            exit 1
          fi
          echo "✅ All merge gates passed. PR ready for review."
