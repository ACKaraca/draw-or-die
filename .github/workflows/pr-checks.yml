name: Merge Gate - PR Checks

on:
  pull_request:
    branches: [main, dev-main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'stores/**'
      - 'types/**'
      - 'scripts/**'
      - 'public/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'postcss.config.mjs'
      - 'jest.config.js'
      - 'playwright.config.ts'

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge-gates:
    name: Merge Gates (Lint, Type, Test, Build)
    if: github.repository == 'ACKaraca/draw-or-die'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type Check
        run: npm run typecheck
        continue-on-error: false
        timeout-minutes: 10
      
      - name: Lint (ESLint)
        run: npm run lint
        continue-on-error: false
        timeout-minutes: 5
      
      - name: Unit & Integration Tests
        run: npm run test:coverage
        continue-on-error: false
        timeout-minutes: 20
      
      - name: Build Check
        run: npm run build
        continue-on-error: false
        timeout-minutes: 10
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  security-audit:
    name: Security Audit & Hardcoded Secrets Check
    if: github.repository == 'ACKaraca/draw-or-die'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: NPM Audit (Production)
        run: |
          npm audit --production --audit-level=moderate > dependency-audit.txt || true
          if grep -qi "vulnerab" dependency-audit.txt; then
            echo "WARNING: Dependency audit findings were recorded in dependency-audit.txt." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "INFO: No production dependency vulnerabilities were reported." >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true
        timeout-minutes: 5
      
      - name: Check for Hardcoded Secrets (Stripe)
        run: |
          if find app components hooks lib stores types -type f \( \
              -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \
            \) -print0 | xargs -0 grep -nH -E "(^|[^A-Za-z0-9_])(sk_live_|pk_live_)"; then
            echo "❌ Found potential hardcoded Stripe keys"
            exit 1
          fi
          echo "✓ No obvious hardcoded Stripe secrets detected"
        continue-on-error: false
        timeout-minutes: 5
      
      - name: Check for Hardcoded Secrets (API Keys)
        run: |
          if find app components hooks lib stores types -type f \( \
              -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \
            \) -print0 | xargs -0 grep -nH -E "(^|[^A-Za-z0-9_])(AIza|sb_secret_)"; then
            echo "❌ Found potential hardcoded Google API keys"
            exit 1
          fi
          if find app components hooks lib stores types -type f \( \
              -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \
            \) -print0 | xargs -0 grep -nH -E "APPWRITE_API_KEY[[:space:]]*[:=][[:space:]]*['\"]|SUPABASE_SERVICE_ROLE_KEY[[:space:]]*[:=][[:space:]]*['\"]"; then
            echo "❌ Found potential hardcoded backend API keys"
            exit 1
          fi
          echo "✓ No obvious hardcoded API keys detected"
        continue-on-error: false
        timeout-minutes: 5

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-security-audit-report
          path: dependency-audit.txt
          if-no-files-found: ignore
          retention-days: 7

  status-check:
    name: Merge Gate Status
    runs-on: ubuntu-latest
    needs: [merge-gates, security-audit]
    if: always() && github.repository == 'ACKaraca/draw-or-die'
    
    steps:
      - name: Check merge gate results
        run: |
          if [ "${{ needs.merge-gates.result }}" != "success" ] || [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "❌ Merge gates failed. Fix errors above before merging."
            exit 1
          fi
          echo "✅ All merge gates passed. PR ready for review."
