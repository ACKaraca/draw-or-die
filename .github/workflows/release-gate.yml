name: Release Gate - Staging Verification & Production Deployment

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  statuses: write

concurrency:
  group: release-deployment
  cancel-in-progress: false

jobs:
  staging-verification:
    name: Staging Verification
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 45
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Production Build
        run: npm run build
        env:
          NODE_ENV: production
        timeout-minutes: 15
      
      - name: Type Check (Final)
        run: npm run typecheck
        timeout-minutes: 10
      
      - name: Lint (Final Check)
        run: npm run lint
        timeout-minutes: 5

      - name: Secret Scan
        run: npm run check:secrets
        timeout-minutes: 5
      
      - name: Unit Tests (Full Suite)
        run: npm run test:coverage
        timeout-minutes: 20
      
      - name: Security Audit (Final)
        run: npm audit --production --audit-level=moderate
        timeout-minutes: 5
        continue-on-error: true
  
  smoke-e2e-tests:
    name: E2E Smoke Tests (Critical Path)
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    needs: staging-verification
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E Smoke Tests
        run: npm run test:e2e:smoke
        timeout-minutes: 20
        env:
          TEST_ENV: staging
          STRIPE_TEST_KEY: ${{ secrets.STRIPE_TEST_KEY }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
  
  payment-integration-check:
    name: Payment & Supabase Integration Validation
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    needs: staging-verification
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate Supabase functions
        run: npm run validate:supabase-functions
        timeout-minutes: 5
      
      - name: Check Stripe configuration
        run: npm run check:stripe-config
        timeout-minutes: 5
      
      - name: Test payment mock fixtures
        run: npm run test:payment-mocks
        timeout-minutes: 5

  security-final-check:
    name: Security & Rate Limiting Check
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    needs: staging-verification
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Check hardcoded secrets (final)
        run: |
          echo "Checking for hardcoded payment keys..."
          if grep -r "sk_live_\|pk_live_" . --include="*.ts" --include="*.tsx" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null; then
            echo "❌ Found hardcoded Stripe production keys"
            exit 1
          fi
          echo "✓ No hardcoded production keys detected"
        timeout-minutes: 5
      
      - name: Verify rate limiting is enabled
        run: npm run check:rate-limiting
        timeout-minutes: 5

  pre-deployment-check:
    name: Pre-Deployment Checklist
    runs-on: ubuntu-latest
    needs: [staging-verification, smoke-e2e-tests, payment-integration-check, security-final-check]
    if: always()
    
    steps:
      - name: Verify all gates passed
        run: |
          echo "Staging Verification: ${{ needs.staging-verification.result }}"
          echo "Smoke E2E Tests: ${{ needs.smoke-e2e-tests.result }}"
          echo "Payment/Supabase Check: ${{ needs.payment-integration-check.result }}"
          echo "Security Check: ${{ needs.security-final-check.result }}"
          
          if [ "${{ needs.staging-verification.result }}" != "success" ] || \
             [ "${{ needs.smoke-e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.payment-integration-check.result }}" != "success" ] || \
             [ "${{ needs.security-final-check.result }}" != "success" ]; then
            echo "❌ Release gates failed. Cannot proceed to production."
            exit 1
          fi
          
          echo "✅ All release gates passed. Ready for production deployment."
      
      - name: Generate deployment summary
        run: |
          echo "## Release Deployment Summary" > /tmp/deployment-summary.md
          echo "- Branch: ${{ github.ref }}" >> /tmp/deployment-summary.md
          echo "- Commit: ${{ github.sha }}" >> /tmp/deployment-summary.md
          echo "- Triggered by: ${{ github.event_name }}" >> /tmp/deployment-summary.md
          echo "- Staging verification: ✅" >> /tmp/deployment-summary.md
          echo "- E2E smoke tests: ✅" >> /tmp/deployment-summary.md
          echo "- Payment/Supabase validated: ✅" >> /tmp/deployment-summary.md
          echo "- Security checks passed: ✅" >> /tmp/deployment-summary.md
          cat /tmp/deployment-summary.md

  production-deployment:
    name: Production Deployment
    runs-on: ubuntu-latest
    environment: production
    needs: [staging-verification, smoke-e2e-tests, payment-integration-check, security-final-check, pre-deployment-check]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Production Build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Deploy to Production
        run: npm run deploy:prod
        env:
          DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
          STRIPE_LIVE_KEY: ${{ secrets.STRIPE_LIVE_KEY }}
          ENVIRONMENT: production
        timeout-minutes: 10
      
      - name: Deploy Supabase Functions
        run: npm run deploy:supabase-functions
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        timeout-minutes: 5
      
      - name: Post-Deploy Health Check
        run: npm run validate:health-check
        timeout-minutes: 5
        continue-on-error: false
      
      - name: Verify payment system online
        run: npm run check:payment-system
        timeout-minutes: 5
        continue-on-error: false
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
          echo "Payment system: ONLINE ✅"
